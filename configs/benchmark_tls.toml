# PQC TLS Benchmark Configuration
# Algorithm names use liboqs naming: ML-KEM-768, ML-DSA-65, etc.

[server]
host = "localhost"
port = 4433
ca_cert = "certs/CA.crt"
verify_peer = true

[provider]
path = "/usr/local/lib/ossl-modules"
name = "oqsprovider"

[benchmark]
iterations = 100
warmup = 10
throughput_test_bytes = 1048576   # 1 MB
parallel_connections = 1

[output]
format = "console"               # "json", "csv", or "console"
path = ""                        # Empty = stdout

# KEM algorithms to benchmark
kem_algorithms = [
    "ML-KEM-512",
    "ML-KEM-768",
    "ML-KEM-1024",
]

# Signature algorithms to benchmark
sig_algorithms = [
    "ML-DSA-44",
    "ML-DSA-65",
    "ML-DSA-87",
]
