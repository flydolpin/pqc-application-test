services:
  # All-in-one benchmark: certs + server + client in single container
  pqc-bench:
    image: pqc-benchmark
    container_name: pqc-bench
    ports:
      - "4433:4433"
    entrypoint: |
      bash -c "
        echo '=== PQC TLS Benchmark (Docker) ===' &&
        echo '' &&
        /opt/pqc/scripts/gen_certs.sh --sig-alg rsa:2048 --out-dir /tmp/certs 2>&1 | tail -3 &&
        echo '' &&
        pqc_tls_server --port 4433 --cert /tmp/certs/server.crt --key /tmp/certs/server.key --max-conn 250 &>/tmp/server.log &
        sleep 1 &&
        echo '--- Classic TLS 1.3 (X25519) ---' &&
        pqc_bench_tls --host 127.0.0.1 --port 4433 --iterations 20 --no-verify --format csv &&
        echo '' &&
        echo '--- ML-KEM-768 ---' &&
        pqc_bench_tls --kem mlkem768 --host 127.0.0.1 --port 4433 --iterations 20 --no-verify --format csv &&
        echo '' &&
        echo '--- ML-KEM-512 ---' &&
        pqc_bench_tls --kem mlkem512 --host 127.0.0.1 --port 4433 --iterations 20 --no-verify --format csv &&
        echo '' &&
        echo '--- ML-KEM-1024 ---' &&
        pqc_bench_tls --kem mlkem1024 --host 127.0.0.1 --port 4433 --iterations 5 --no-verify --format csv &&
        echo '' &&
        echo '=== All benchmarks complete ==='
      "
